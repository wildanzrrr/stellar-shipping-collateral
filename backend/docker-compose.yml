services:
  postgres:
    image: postgres:16-alpine
    platform: linux/amd64
    container_name: sep57-postgres
    env_file:
      - .env
    environment:
      - POSTGRES_USER=sep57_user
      - POSTGRES_PASSWORD=sep57_secure_password
      - POSTGRES_DB=sep57
    ports:
      - '5433:5432'
    volumes:
      - sep57-postgres:/var/lib/postgresql/data
    networks:
      - sep57-network
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U sep57_user -d sep57']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M

  sep57-backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sep57-backend
    restart: unless-stopped
    environment:
      - NODE_ENV=production
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M
    healthcheck:
      test:
        [
          'CMD',
          'wget',
          '--no-verbose',
          '--tries=1',
          '--spider',
          'http://localhost:2000/health',
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    env_file:
      - .env
    ports:
      - '${PORT:-2000}:2000'
    networks:
      - sep57-network
    volumes:
      - sep57-backend:/app/data
    depends_on:
      postgres:
        condition: service_healthy
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '3'

volumes:
  sep57-backend:
    name: sep57-backend
  sep57-postgres:
    name: sep57-postgres

networks:
  sep57-network:
    driver: bridge
    name: sep57-network
    internal: false
